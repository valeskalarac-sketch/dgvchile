<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DGV Chile — Notificaciones</title>
  <meta name="theme-color" content="#131313">
  <link rel="stylesheet" href="css/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    .notif-item { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border-bottom:1px solid var(--color-outline-variant); cursor:pointer; transition:background .15s; }
    .notif-item:hover { background:var(--color-surface-container); }
    .notif-item.unread { background:rgba(255,186,32,.04); }
    .notif-icon { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .notif-dot { width:8px; height:8px; background:var(--color-primary); border-radius:50%; flex-shrink:0; margin-top:6px; }
    .tabs-bar { display:flex; border-bottom:1px solid var(--color-outline-variant); }
    .n-tab { flex:1; padding:12px; text-align:center; font-size:14px; font-weight:600; color:var(--color-outline); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
    .n-tab.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }
  </style>
</head>
<body>
  <header class="top-header">
    <button class="btn-icon" onclick="history.back()" aria-label="Volver">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <span class="top-header-title" style="margin-left:8px">Notificaciones</span>
    <button class="btn-ghost" style="margin-left:auto;font-size:13px;font-weight:500;color:var(--color-primary)"
      onclick="document.querySelectorAll('.notif-item.unread').forEach(n=>{n.classList.remove('unread')});document.querySelector('.badge-red')?.remove();showToast('Todo marcado como leído','done_all')">
      Marcar todo
    </button>
  </header>

  <main class="page" style="padding-bottom:0">
    <!-- Tabs -->
    <div class="tabs-bar">
      <div class="n-tab active" onclick="showTab('all',this)">
        Todas
        <span class="badge badge-red" style="margin-left:6px;padding:2px 6px;font-size:10px;border-radius:999px">3</span>
      </div>
      <div class="n-tab" onclick="showTab('unread',this)">No leídas</div>
    </div>

    <div id="notif-all" id="notif-list"></div>
    <div id="notif-unread" style="display:none"></div>
  </main>

  <div id="bottom-nav" data-page="perfil"></div>
  <script src="js/app.js"></script>
  <script>
    const iconColors = {
      chat:'#4ecdc4', favorite:'#ff6b6b', work:'var(--color-primary)',
      comment:'#45b7d1', person_add:'#6c5ce7', visibility:'#a29bfe'
    };
    const iconBg = {
      chat:'rgba(78,205,196,.15)', favorite:'rgba(255,107,107,.15)', work:'rgba(255,186,32,.15)',
      comment:'rgba(69,183,209,.15)', person_add:'rgba(108,92,231,.15)', visibility:'rgba(162,155,254,.15)'
    };

    function renderNotifs(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = items.map(n => `
        <div class="notif-item ${!n.leido?'unread':''}" onclick="markRead(this)">
          <div class="notif-icon" style="background:${iconBg[n.icon]||'var(--color-surface-container)'}">
            <span class="material-symbols-outlined icon-filled" style="font-size:20px;color:${iconColors[n.icon]||'var(--color-primary)'}">
              ${n.icon}
            </span>
          </div>
          <div style="flex:1;min-width:0">
            <div class="text-title-sm" style="margin-bottom:2px">${n.actor}</div>
            <div class="text-body-sm text-muted" style="margin-bottom:4px">${n.texto}</div>
            <div class="text-label text-muted">${n.tiempo}</div>
          </div>
          ${!n.leido ? '<div class="notif-dot"></div>' : ''}
        </div>`).join('');
    }

    function markRead(el) {
      el.classList.remove('unread');
      el.querySelector('.notif-dot')?.remove();
      updateBadge();
    }

    function updateBadge() {
      const unread = document.querySelectorAll('#notif-all .notif-item.unread').length;
      const badge = document.querySelector('.tabs-bar .badge-red');
      if (badge) badge.textContent = unread || '';
      if (!unread && badge) badge.remove();
    }

    function showTab(id, el) {
      document.getElementById('notif-all').style.display = id === 'all' ? 'block' : 'none';
      document.getElementById('notif-unread').style.display = id === 'unread' ? 'block' : 'none';
      document.querySelectorAll('.n-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    renderNotifs(DATA.notificaciones, 'notif-all');
    renderNotifs(DATA.notificaciones.filter(n => !n.leido), 'notif-unread');
  </script>
</body>
</html>
