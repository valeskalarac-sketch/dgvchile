<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 44" role="img" aria-label="DGV Chile">
  <defs>
    <filter id="r2">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Diamantes dorados -->
  <g fill="#E5A922">
    <path d="M26 9 L28 12 L26 15 L24 12 Z"/>
    <path d="M60 9 L62 12 L60 15 L58 12 Z"/>
    <path d="M94 9 L96 12 L94 15 L92 12 Z"/>
  </g>

  <!-- DGV -->
  <text x="60" y="24"
    text-anchor="middle"
    font-family="'Bricolage Grotesque', Georgia, serif"
    font-size="26" font-weight="900" fill="#ffffff"
    letter-spacing="2" filter="url(#r2)" style="font-style:italic">DGV</text>

  <!-- Pincelada dorada -->
  <path d="M18 28 C35 25, 85 25, 102 28 C103 33, 102 38, 100 39 C83 42, 34 42, 18 39 C16 36, 16 31, 18 28 Z"
        fill="#E5A922" opacity="0.95"/>

  <!-- CHILE -->
  <text x="60" y="39"
    text-anchor="middle"
    font-family="'Bricolage Grotesque', Impact, sans-serif"
    font-size="11" font-weight="900" fill="#000000" letter-spacing="3">CHILE</text>
</svg>
