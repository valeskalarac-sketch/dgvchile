<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DGV Chile</title>
  <meta name="theme-color" content="#0B0B0B">
  <link rel="stylesheet" href="css/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bricolage+Grotesque:opsz,wght@12..60,400;12..60,700;12..60,900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0B0B0B;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Partículas de fondo */
    .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: #E5A922;
      border-radius: 50%;
      opacity: 0;
      animation: float-particle linear infinite;
    }
    @keyframes float-particle {
      0%   { opacity:0; transform:translateY(100vh) scale(0); }
      10%  { opacity:.6; }
      90%  { opacity:.3; }
      100% { opacity:0; transform:translateY(-10vh) scale(1.5); }
    }

    /* Glow de fondo */
    .glow-bg {
      position: fixed;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(229,169,34,.12) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { transform:translate(-50%,-50%) scale(1); opacity:.6; }
      50%      { transform:translate(-50%,-50%) scale(1.2); opacity:1; }
    }

    /* Contenedor logo */
    .splash-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      animation: reveal .8s cubic-bezier(.175,.885,.32,1.275) .2s both;
    }
    @keyframes reveal {
      from { opacity:0; transform:scale(.8) translateY(20px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* Logo principal */
    .logo-dgv {
      font-family: 'Permanent Marker', cursive;
      font-size: 88px;
      color: #ffffff;
      line-height: .9;
      letter-spacing: 6px;
      text-shadow: 0 0 60px rgba(229,169,34,.3);
      position: relative;
    }

    /* Diamantes decorativos */
    .diamonds {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .diamond {
      width: 8px; height: 8px;
      background: #E5A922;
      transform: rotate(45deg);
      animation: diamond-pulse 2s ease-in-out infinite;
    }
    .diamond:nth-child(2) { animation-delay:.3s; width:10px; height:10px; }
    .diamond:nth-child(3) { animation-delay:.6s; }
    @keyframes diamond-pulse { 0%,100%{opacity:.6} 50%{opacity:1;transform:rotate(45deg) scale(1.3)} }

    /* Líneas brush laterales */
    .brush-lines {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 6px;
    }
    .brush-line-group {
      display: flex; flex-direction: column; gap: 4px;
    }
    .brush-line {
      height: 3px; border-radius: 2px;
      background: #ffffff;
      opacity: .7;
    }

    /* Trazo dorado CHILE */
    .chile-wrap {
      position: relative;
      margin-top: 6px;
      padding: 8px 32px 10px;
    }
    .chile-brush {
      position: absolute; inset: 0;
      background: #E5A922;
      clip-path: polygon(2% 8%, 96% 0%, 100% 70%, 97% 100%, 3% 95%, 0% 30%);
      filter: url(#brush);
    }
    .chile-text {
      position: relative; z-index: 1;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 900;
      font-size: 28px;
      color: #000000;
      letter-spacing: 10px;
      line-height: 1;
    }

    /* Subtítulo */
    .splash-sub {
      margin-top: 14px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      animation: fade-in 1s ease .8s both;
    }
    @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Tagline */
    .splash-tagline {
      margin-top: 32px;
      text-align: center;
      animation: fade-in 1s ease 1.2s both;
    }
    .tagline-main {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,.85);
      line-height: 1.5;
    }
    .tagline-main strong { color: #E5A922; font-weight: 700; }

    /* Loading bar */
    .loading-bar {
      width: 200px; height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 1px;
      margin-top: 48px;
      overflow: hidden;
      animation: fade-in .5s ease 1.5s both;
    }
    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #E5A922, #F1B81A);
      border-radius: 1px;
      animation: loading 1.8s ease 1.5s both;
    }
    @keyframes loading { from{width:0} to{width:100%} }

    /* Botones de entrada */
    .splash-buttons {
      display: flex; flex-direction: column; gap: 12px;
      width: 280px; margin-top: 48px;
      animation: fade-in .6s ease 2s both;
    }
    .btn-splash-primary {
      padding: 15px; border-radius: 999px;
      background: #E5A922; color: #000;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px; font-weight: 700;
      border: none; cursor: pointer;
      letter-spacing: .5px;
      box-shadow: 0 4px 32px rgba(229,169,34,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-splash-primary:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(229,169,34,.5); }
    .btn-splash-secondary {
      padding: 14px; border-radius: 999px;
      background: transparent; color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px; font-weight: 500;
      border: 1.5px solid rgba(255,255,255,.2);
      cursor: pointer; transition: border-color .15s;
    }
    .btn-splash-secondary:hover { border-color:rgba(255,255,255,.5); }

    /* Versión piloto badge */
    .pilot-badge {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      background: rgba(48,209,88,.1); border: 1px solid rgba(48,209,88,.25);
      border-radius: 999px; padding: 6px 14px;
      animation: fade-in .6s ease 2.5s both;
    }
    .pilot-dot { width:6px; height:6px; border-radius:50%; background:#30d158; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pilot-text { font-size:11px; color:#30d158; font-weight:600; font-family:'Bricolage Grotesque',sans-serif; letter-spacing:.05em; }
  </style>
</head>
<body>

  <!-- SVG filter para efecto brush -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="brush">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Partículas -->
  <div class="particles" id="particles"></div>
  <div class="glow-bg"></div>

  <!-- Contenido principal -->
  <div class="splash-content">

    <!-- Diamantes superiores -->
    <div class="diamonds">
      <div class="diamond"></div>
      <div class="diamond"></div>
      <div class="diamond"></div>
    </div>

    <!-- Líneas + DGV + Líneas -->
    <div class="brush-lines">
      <div class="brush-line-group">
        <div class="brush-line" style="width:32px"></div>
        <div class="brush-line" style="width:26px"></div>
        <div class="brush-line" style="width:30px"></div>
      </div>
      <div class="logo-dgv">DGV</div>
      <div class="brush-line-group">
        <div class="brush-line" style="width:32px"></div>
        <div class="brush-line" style="width:26px"></div>
        <div class="brush-line" style="width:30px"></div>
      </div>
    </div>

    <!-- CHILE con pincelada -->
    <div class="chile-wrap">
      <div class="chile-brush"></div>
      <div class="chile-text">CHILE</div>
    </div>

    <!-- Subtítulo -->
    <div class="splash-sub">— Comunidad Creativa —</div>

    <!-- Tagline -->
    <div class="splash-tagline">
      <div class="tagline-main">La comunidad donde el<br><strong>diseño conecta</strong></div>
    </div>

    <!-- Botones -->
    <div class="splash-buttons">
      <button class="btn-splash-primary" onclick="window.location.href='login.html'">
        Unirme gratis al piloto
      </button>
      <button class="btn-splash-secondary" onclick="demoAccess()">
        Ver la app sin cuenta →
      </button>
    </div>
  </div>

  <!-- Badge piloto -->
  <div class="pilot-badge">
    <div class="pilot-dot"></div>
    <span class="pilot-text">Piloto gratuito activo</span>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    // Generar partículas flotantes
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random()*100}%;
        width: ${2+Math.random()*3}px;
        height: ${2+Math.random()*3}px;
        animation-duration: ${4+Math.random()*6}s;
        animation-delay: ${Math.random()*4}s;
        opacity: ${0.3+Math.random()*0.4};
      `;
      container.appendChild(p);
    }

    // Si ya está logueado, ir directo al home
    if (auth.isLoggedIn()) window.location.href = 'index.html';

    function demoAccess() {
      sessionStorage.setItem('dgv_user', JSON.stringify({
        id: 'a1b2c3d4-0001-0001-0001-000000000001',
        email: 'vale@dgvchile.cl',
        nombre: 'Valentina Rojas',
        demo: true
      }));
      sessionStorage.setItem('dgv_token', 'demo_token');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
