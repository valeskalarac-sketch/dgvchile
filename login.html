<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DGV Chile — Entrar</title>
  <meta name="theme-color" content="#FAFAFA">
  <link rel="stylesheet" href="css/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; justify-content:center; }
    .auth-wrap { padding:32px 24px; }
    .logo-block { text-align:center; margin-bottom:40px; }
    .logo-text { font-size:36px; font-weight:800; color:var(--color-primary); letter-spacing:4px; }
    .logo-sub { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--color-outline); margin-top:4px; }
    .tabs { display:flex; background:var(--color-surface-container); border-radius:999px; padding:4px; margin-bottom:28px; }
    .auth-tab { flex:1; padding:10px; text-align:center; font-size:14px; font-weight:600; border-radius:999px; cursor:pointer; transition:all .2s; color:var(--color-outline); border:none; background:none; font-family:inherit; }
    .auth-tab.active { background:var(--color-surface-bright); color:var(--color-on-surface); }
    .form-group { margin-bottom:16px; }
    .form-label { font-size:12px; font-weight:600; color:var(--color-outline); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:6px; }
    .error-msg { background:rgba(255,59,48,.1); border:1px solid rgba(255,59,48,.3); border-radius:10px; padding:10px 14px; font-size:13px; color:#ff6b6b; margin-bottom:16px; display:none; }
    .divider-text { text-align:center; position:relative; margin:20px 0; }
    .divider-text::before { content:''; position:absolute; top:50%; left:0; right:0; border-top:1px solid var(--color-outline-variant); }
    .divider-text span { position:relative; background:var(--color-background); padding:0 12px; font-size:12px; color:var(--color-outline); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <!-- Logo oficial -->
    <div class="logo-block">
      <div style="margin-bottom:20px">
        <img src="assets/logo-dgv-light.svg" alt="DGV Chile" style="width:220px;height:auto;margin:0 auto;display:block;filter:drop-shadow(0 4px 24px rgba(229,169,34,.25))">
      </div>
      <p style="font-size:13px;color:var(--color-outline);line-height:1.6;margin-top:4px">
        La comunidad donde el <span style="color:var(--color-primary)">diseño conecta</span>
      </p>
    </div>

    <!-- Tabs Login / Registro -->
    <div class="tabs">
      <button class="auth-tab active" onclick="showTab('login',this)">Entrar</button>
      <button class="auth-tab" onclick="showTab('register',this)">Registrarse</button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg"></div>

    <!-- FORM LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="input-field" id="login-email" placeholder="tu@email.cl" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div style="position:relative">
          <input type="password" class="input-field" id="login-pass" placeholder="••••••••" autocomplete="current-password">
          <button onclick="togglePass('login-pass')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--color-outline);cursor:pointer">
            <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
          </button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:15px;margin-top:8px" onclick="doLogin()" id="btn-login">
        Entrar a DGV Chile
      </button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--color-outline)">
        ¿Olvidaste tu contraseña? <a href="#" style="color:var(--color-primary)">Recuperar</a>
      </p>
    </div>

    <!-- FORM REGISTRO -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="input-field" id="reg-nombre" placeholder="Valentina Rojas">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="input-field" id="reg-email" placeholder="tu@email.cl" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div style="position:relative">
          <input type="password" class="input-field" id="reg-pass" placeholder="Mínimo 8 caracteres">
          <button onclick="togglePass('reg-pass')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--color-outline);cursor:pointer">
            <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Soy principalmente</label>
        <div style="display:flex;gap:8px">
          <button class="chip active" onclick="selectRol(this,'diseñador')" id="rol-dis">Diseñador/a</button>
          <button class="chip" onclick="selectRol(this,'cliente')" id="rol-cli">Cliente / Empresa</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:15px;margin-top:8px" onclick="doRegister()" id="btn-register">
        Crear mi cuenta gratis
      </button>
      <p style="text-align:center;margin-top:12px;font-size:11px;color:var(--color-outline);line-height:1.5">
        Al registrarte aceptas los <a href="#" style="color:var(--color-primary)">Términos</a> y la <a href="#" style="color:var(--color-primary)">Política de Privacidad</a>
      </p>
    </div>

    <!-- Demo rápida -->
    <div class="divider-text"><span>o prueba sin cuenta</span></div>
    <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="demoLogin()">
      <span class="material-symbols-outlined">play_arrow</span> Ver demo como Valentina Rojas
    </button>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    let rolSeleccionado = 'diseñador';

    function showTab(tab, el) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.style.display = 'block';
    }
    function hideError() { document.getElementById('error-msg').style.display = 'none'; }

    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function selectRol(el, rol) {
      rolSeleccionado = rol;
      document.querySelectorAll('#form-register .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { showError('Completa todos los campos'); return; }

      const btn = document.getElementById('btn-login');
      btn.textContent = 'Entrando...'; btn.disabled = true;

      try {
        const data = await auth.signIn(email, pass);
        if (data.access_token) {
          window.location.href = 'index.html';
        } else {
          showError(data.error_description || 'Email o contraseña incorrectos');
          btn.textContent = 'Entrar a DGV Chile'; btn.disabled = false;
        }
      } catch(e) {
        showError('Error de conexión. Intenta de nuevo.');
        btn.textContent = 'Entrar a DGV Chile'; btn.disabled = false;
      }
    }

    async function doRegister() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const email  = document.getElementById('reg-email').value.trim();
      const pass   = document.getElementById('reg-pass').value;
      if (!nombre || !email || !pass) { showError('Completa todos los campos'); return; }
      if (pass.length < 8) { showError('La contraseña debe tener al menos 8 caracteres'); return; }

      const btn = document.getElementById('btn-register');
      btn.textContent = 'Creando cuenta...'; btn.disabled = true;

      try {
        const data = await auth.signUp(email, pass, nombre);
        if (data.user) {
          showError(''); 
          alert('¡Cuenta creada! Revisa tu email para confirmar tu cuenta.');
          btn.textContent = 'Crear mi cuenta gratis'; btn.disabled = false;
        } else {
          showError(data.msg || 'Error al crear la cuenta');
          btn.textContent = 'Crear mi cuenta gratis'; btn.disabled = false;
        }
      } catch(e) {
        showError('Error de conexión. Intenta de nuevo.');
        btn.textContent = 'Crear mi cuenta gratis'; btn.disabled = false;
      }
    }

    function demoLogin() {
      // Login demo sin cuenta real
      sessionStorage.setItem('dgv_user', JSON.stringify({
        id: 'a1b2c3d4-0001-0001-0001-000000000001',
        email: 'vale@dgvchile.cl',
        nombre: 'Valentina Rojas',
        demo: true
      }));
      sessionStorage.setItem('dgv_token', 'demo_token');
      window.location.href = 'index.html';
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('form-login').style.display !== 'none') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
